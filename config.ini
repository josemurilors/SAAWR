# ─── SA - AWR Configuração ───────────────────────────────────────────
# Este arquivo define os caminhos principais para os scripts.
# Ajuste conforme sua instalação do GTA SA.

[paths]
# Diretório raiz do GTA San Andreas
game_dir = /mnt/sda1/games/GTA San Andreas

# Pasta dentro do modloader para novos veículos
modloader_vehicles = modloader/novos-carros

# Pasta dentro do modloader para novas armas
modloader_weapons = modloader/novas-armas

# Pasta do fastman92 limit adjuster (dentro do modloader)
fastman92_dir = modloader/$fastman92 limit adjuster

# Pasta de dados do jogo (data/)
game_data = data

[weapon_config]
# IDs iniciais para armas adicionadas (faixa reservada MixMods)
weapon_id_start = 12400

# IDs iniciais para veículos adicionados
vehicle_id_start = 12501

# Arquivo de configuração de armas do fastman92
weapon_config_file = data/gtasa_weapon_config.dat
